server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: campus-service

  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

  servlet:
    multipart:
      max-file-size: 2GB
      max-request-size: 2GB

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/campus_service?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&connectionTimeZone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:3000ms}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.twilight.campus.pojo
  configuration:
    map-underscore-to-camel-case: true

campus:
  upload:
    path: ${CAMPUS_UPLOAD_PATH:uploads}
  cors:
    allowed-origins: ${CAMPUS_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  cache:
    redis-enabled: ${CAMPUS_REDIS_ENABLED:false}
    hot-content-ttl-seconds: ${CAMPUS_HOT_CONTENT_TTL_SECONDS:60}
    login-rate-limit-window-seconds: ${CAMPUS_LOGIN_RATE_LIMIT_WINDOW_SECONDS:60}
    login-rate-limit-max-attempts: ${CAMPUS_LOGIN_RATE_LIMIT_MAX_ATTEMPTS:10}
    counter-flush-delay-ms: ${CAMPUS_COUNTER_FLUSH_DELAY_MS:30000}
    like-write-behind-enabled: ${CAMPUS_LIKE_WRITE_BEHIND_ENABLED:false}
    view-write-behind-enabled: ${CAMPUS_VIEW_WRITE_BEHIND_ENABLED:false}
